<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ root }}/static/css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ root }}/index.html">📈 {{ site.title }}</a>
    <nav class="nav">
      <a href="{{ root }}/index.html" class="{{ 'active' if active=='home' else '' }}">대시보드</a>
      <a href="{{ root }}/morning/index.html" class="{{ 'active' if active=='morning' else '' }}">모닝리포트</a>
      <a href="{{ root }}/news/index.html" class="{{ 'active' if active=='news' else '' }}">뉴스</a>
      <a href="{{ root }}/trades/index.html" class="{{ 'active' if active=='trades' else '' }}">매매일지</a>
      <a href="{{ root }}/ai-office/index.html" class="{{ 'active' if active=='office' else '' }}">AI Office</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>{{ site.title }} · 정적 생성(GitHub Pages) · 정보·참고용</span>
  </footer>

  <script src="{{ root }}/static/js/app.js" defer></script>
</body>
</html>
