name: Trades Dashboard

on:
  push:
    paths:
      - "data/trades/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ_NAME: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python build.py trades
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs vault
          git diff --cached --quiet || git commit -m "chore(trades): rebuild dashboard"
          git pull --rebase --autostash || true
          git push
