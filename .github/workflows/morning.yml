name: Morning Report

on:
  schedule:
    # KST 06:30 월~금 = UTC 21:30 일~목 (UTC+9)
    - cron: "30 21 * * 0-4"
  push:
    paths:
      - "data/cache/**"   # 데스크톱이 야간선물 갱신 push 시 리포트 재생성
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ_NAME: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python build.py morning
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "chore(morning): report $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git pull --rebase --autostash || true
          git push
