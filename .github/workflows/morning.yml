name: Morning Report

on:
  schedule:
    # KST 06:30 월~금 = UTC 21:30 일~목 (UTC+9)
    - cron: "30 21 * * 0-4"
  push:
    paths:
      - "data/cache/**"   # 데스크톱이 야간선물 갱신 push 시 리포트 재생성
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ_NAME: Asia/Seoul
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DB_ASSETS: fd72dc64181e4c88b25a21886f441628
      NOTION_DB_GOALS: 18580be0659e477b84eb1d03951161da
      NOTION_DB_WATCHLIST: 32ddf8f8f7634c5db2cf85696fcbe276
      NOTION_DB_CASHFLOW: 3ee0fbc7afe741b9a98606a33b60f359
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python build.py morning
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "chore(morning): report $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git pull --rebase --autostash || true
          git push
