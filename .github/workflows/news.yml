name: News Center

on:
  schedule:
    - cron: "*/30 * * * *"   # 30분마다
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ_NAME: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python build.py news
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs vault
          git diff --cached --quiet || git commit -m "chore(news): update $(date -u +%H:%MZ)"
          git pull --rebase --autostash || true
          git push
