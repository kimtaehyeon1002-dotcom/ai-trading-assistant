name: News Center

on:
  schedule:
    - cron: "*/30 * * * *"   # 30분마다
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ_NAME: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        # TH_DATA(Obsidian vault, private) 브릿지 — 토큰 미설정/만료여도 Pages 빌드는 계속
        continue-on-error: true
        with:
          repository: kimtaehyeon1002-dotcom/TH_DATA
          token: ${{ secrets.TH_DATA_TOKEN }}
          path: TH_DATA
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python build.py news
        env:
          TH_DATA_DIR: ${{ github.workspace }}/TH_DATA
      - name: Commit & push (pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "chore(news): update $(date -u +%H:%MZ)"
          git pull --rebase --autostash || true
          git push
      - name: Commit & push (TH_DATA vault)
        run: |
          if [ -d TH_DATA/.git ]; then
            cd TH_DATA
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --quiet || git commit -m "bot(vault): news $(date -u +%H:%MZ)"
            git pull --rebase --autostash || true
            git push
          fi
